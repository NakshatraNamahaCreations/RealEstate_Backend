<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — 30Forty</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f4f6fb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .card {
        background: #fff;
        width: 100%;
        max-width: 420px;
        border-radius: 12px;
        padding: 32px 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      h1 { margin: 0 0 8px; font-size: 22px; color: #1a1f36; }
      p.sub { margin: 0 0 24px; color: #6b7280; font-size: 14px; }
      label { display: block; font-size: 13px; color: #374151; margin-bottom: 6px; }
      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
        margin-bottom: 16px;
        outline: none;
      }
      input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { background: #9ca3af; cursor: not-allowed; }
      .msg { margin-top: 16px; font-size: 14px; padding: 12px; border-radius: 8px; }
      .msg.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
      .msg.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset your password</h1>
      <p class="sub">Enter a new password for your 30Forty account.</p>

      <form id="resetForm">
        <label for="password">New password</label>
        <input
          type="password"
          id="password"
          minlength="8"
          required
          placeholder="At least 8 characters"
        />

        <label for="confirm">Confirm new password</label>
        <input type="password" id="confirm" minlength="8" required />

        <button type="submit" id="submitBtn">Reset password</button>
      </form>

      <div id="message" class="msg hidden"></div>
    </div>

    <script>
      // 🔧 Set this to your backend base URL (no trailing slash)
      const API_BASE_URL = "https://YOUR-BACKEND-DOMAIN.com";

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      const form = document.getElementById("resetForm");
      const submitBtn = document.getElementById("submitBtn");
      const messageEl = document.getElementById("message");

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = "msg " + type;
      }

      if (!token) {
        form.classList.add("hidden");
        showMessage(
          "This reset link is missing a token. Please request a new password reset from the app.",
          "error"
        );
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;

        if (password.length < 8) {
          return showMessage("Password must be at least 8 characters.", "error");
        }
        if (password !== confirm) {
          return showMessage("Passwords do not match.", "error");
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Resetting...";
        messageEl.className = "msg hidden";

        try {
          const res = await fetch(API_BASE_URL + "/api/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password }),
          });
          const data = await res.json();

          if (res.ok) {
            form.classList.add("hidden");
            showMessage(
              "Password reset successfully. You can now sign in to the 30Forty app with your new password.",
              "success"
            );
          } else {
            showMessage(
              data.message || "Could not reset password. The link may have expired.",
              "error"
            );
            submitBtn.disabled = false;
            submitBtn.textContent = "Reset password";
          }
        } catch (err) {
          showMessage("Network error. Please check your connection and try again.", "error");
          submitBtn.disabled = false;
          submitBtn.textContent = "Reset password";
        }
      });
    </script>
  </body>
</html>
